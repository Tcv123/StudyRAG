  <script>
  // Topic names for flat-array MCQ files (P12–P21)
  const TOPIC_NAMES = {
    'P1':'Algebraic Expressions','P2':'Quadratics','P3':'Equations and Inequalities',
    'P4':'Graphs and Transformations','P5':'Straight Lines and Circles','P6':'Trigonometric Ratios',
    'P7':'Trigonometric Identities and Equations','P8':'Exponentials and Logarithms',
    'P9':'Differentiation (Year 1)','P10':'Integration (Year 1)','P11':'Vectors (Year 1)',
    'P12':'Algebraic Methods','P13':'Functions and Graphs','P14':'Sequences and Series',
    'P15':'Radians','P16':'Trigonometric Functions','P17':'Parametric Equations',
    'P18':'Differentiation (Year 2)','P19':'Numerical Methods','P20':'Integration (Year 2)',
    'P21':'Vectors (3D)','S1':'Statistical Sampling','S2':'Data Presentation and Measures',
    'S3':'Probability','S4':'Binomial Distribution','S5':'Hypothesis Testing (Binomial)',
    'S6':'Regression and Correlation','S7':'Conditional Probability','S8':'Normal Distribution',
    'M1':'Modelling in Mechanics','M2':'Kinematics (SUVAT)','M3':'Forces and Newton\'s Laws',
    'M4':'Moments','M5':'Variable Acceleration','M6':'Projectiles','M7':'Further Forces'
  };

  // Convert flat-array format to grouped object format
  function flatToGrouped(arr, topicKeys) {
    const result = {};
    for (const key of topicKeys) {
      const items = arr.filter(q => q.topic === key);
      result[key] = {
        name: TOPIC_NAMES[key] || key,
        green: items.filter(q => q.tier === 'green'),
        amber: items.filter(q => q.tier === 'amber'),
        red: items.filter(q => q.tier === 'red')
      };
    }
    return result;
  }

  // Merge all MCQ data — handle both object and array formats
  const _P12_P16_grouped = Array.isArray(EDEXCEL_MCQ_P12_P16)
    ? flatToGrouped(EDEXCEL_MCQ_P12_P16, ['P12','P13','P14','P15','P16'])
    : EDEXCEL_MCQ_P12_P16;
  const _P17_P21_grouped = Array.isArray(EDEXCEL_MCQ_P17_P21)
    ? flatToGrouped(EDEXCEL_MCQ_P17_P21, ['P17','P18','P19','P20','P21'])
    : EDEXCEL_MCQ_P17_P21;
  const _S1_S5_grouped = Array.isArray(EDEXCEL_MCQ_S1_S5)
    ? flatToGrouped(EDEXCEL_MCQ_S1_S5, ['S1','S2','S3','S4','S5'])
    : EDEXCEL_MCQ_S1_S5;

  const MATHS_EDEXCEL_QUESTIONS = {
    ...EDEXCEL_MCQ_P1_P6,
    ...EDEXCEL_MCQ_P7_P11,
    ..._P12_P16_grouped,
    ..._P17_P21_grouped,
    ..._S1_S5_grouped,
    ...EDEXCEL_MCQ_S6S8_M1M2,
    ...EDEXCEL_MCQ_M3_M7
  };

  // Ensure all topics have the name field (for grouped files that might lack it)
  for (const [key, val] of Object.entries(MATHS_EDEXCEL_QUESTIONS)) {
    if (!val.name && TOPIC_NAMES[key]) val.name = TOPIC_NAMES[key];
  }

  const MATHS_EDEXCEL_WRITTEN = {
    ...EDEXCEL_WRITTEN_P1_P11,
    ...EDEXCEL_WRITTEN_P12_P21,
    ...EDEXCEL_WRITTEN_S1_S8,
    ...EDEXCEL_WRITTEN_M1_M2,
    ...EDEXCEL_WRITTEN_M3_M4,
    ...EDEXCEL_WRITTEN_M5_M7
  };
  </script>

      --red: #DC2626; --red-bg: rgba(220,38,38,0.07); --red-border: rgba(220,38,38,0.18);

<script>
const W = { green: 1, amber: 2, red: 3, written_full: 3, written_partial: 1.5 };
const THRESHOLD = { green: 8, amber: 4 };
const KATEX_DELIMITERS = [{left:'$$',right:'$$',display:true},{left:'\\(',right:'\\)',display:false}];
function renderMath() { setTimeout(() => renderMathInElement(document.getElementById('cardWrapper'), {delimiters: KATEX_DELIMITERS}), 50); }

function buildQuestionSet(mcq, written) {
  const w = written || { green: [], amber: [], red: [] };
  const tiers = ['green', 'amber', 'red'];
  const writtenTier = tiers[Math.floor(Math.random() * tiers.length)];
  const need = { green: 2, amber: 2, red: 1 };
  const selected = [];
  for (const tier of tiers) {
    const count = need[tier];
    if (tier === writtenTier && w[tier] && w[tier].length > 0) {
      const wq = pick(w[tier], 1).map(q => ({ ...q, type: 'written', tier }));
      selected.push(...wq);
      if (count > 1 && mcq[tier]) selected.push(...pick(mcq[tier], count - 1).map(q => ({ ...q, type: 'mcq', tier })));
    } else {
      if (mcq[tier]) selected.push(...pick(mcq[tier], count).map(q => ({ ...q, type: 'mcq', tier })));
    }
  }
  if (!selected.some(q => q.type === 'written')) {
    for (const tier of tiers) {
      if (w[tier] && w[tier].length > 0) {
        const wq = pick(w[tier], 1).map(q => ({ ...q, type: 'written', tier }))[0];
        const idx = selected.findIndex(q => q.type === 'mcq' && q.tier === tier);
        if (idx !== -1) { selected[idx] = wq; break; }
      }
    }
  }
  return shuffle(selected);
}

function computeRag(results) {
  const score = results.reduce((s, r) => s + (r.pts || 0), 0);
  if (score >= THRESHOLD.green) return 'green';
  if (score >= THRESHOLD.amber) return 'amber';
  return 'red';
}

function pick(arr, n) {
  const a = [...arr], out = [];
  while (out.length < n && a.length) { const i = Math.floor(Math.random() * a.length); out.push(a.splice(i, 1)[0]); }
  return out;
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
const LETTERS = ['A','B','C','D'];
const RAG = {
  green: { emoji:'🟢', label:'Green — Strong Understanding', desc:'Excellent work. You handled both the recall and the harder questions well. Keep revisiting this topic periodically to stay sharp.' },
  amber: { emoji:'🟡', label:'Amber — Developing', desc:'You have the foundations but the trickier questions need more work. Go back through the notes, focus on the areas you missed, then re-test.' },
  red: { emoji:'🔴', label:'Red — Needs Revision', desc:'This topic needs dedicated revision. Work carefully through the notes and make sure you understand the key concepts before testing again.' },
};

const params = new URLSearchParams(location.search);
const topicKey = params.get('topic') || '';
const wrapper = document.getElementById('cardWrapper');
let user = null, questions = [], qIndex = 0, results = [], selectedI = null;

async function init() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) { location.href = '../auth/login.html'; return; }
  user = session.user;
  const mcqData = MATHS_EDEXCEL_QUESTIONS[topicKey];
  const writtenData = MATHS_EDEXCEL_WRITTEN?.[topicKey];
  if (!mcqData) { showError(`Topic "${topicKey}" not found.`); return; }
  document.title = `RAG Learning — ${topicKey} Diagnostic`;
  document.getElementById('topicBadge').textContent = `${topicKey} — ${mcqData.name}`;
  const storeKey = `diag_maths_edexcel_${topicKey}`;
  const saved = sessionStorage.getItem(storeKey);
  if (saved) { try { questions = JSON.parse(saved); } catch(e) { questions = null; } }
  if (!questions || !questions.length) {
    questions = buildQuestionSet(mcqData, writtenData);
    sessionStorage.setItem(storeKey, JSON.stringify(questions));
  }
  if (!questions || !questions.length) {
    showError(`Questions for "${topicKey} — ${mcqData.name}" aren't available yet. Try another topic or come back later.`);
    return;
  }
  renderIntro(mcqData.name);
}

function renderIntro(topicName) {
  wrapper.innerHTML = `
    <div class="question-card" style="text-align:center;padding:48px 40px;">
      <div style="font-size:48px;margin-bottom:20px;">◎</div>
      <div style="font-family:var(--font-display);font-size:24px;margin-bottom:8px;">${topicKey} — ${topicName}</div>
      <p style="color:var(--muted);font-size:15px;line-height:1.7;max-width:440px;margin:0 auto 28px;">
        This diagnostic has <strong>5 questions</strong> to test your understanding.
      </p>
      <div style="display:flex;flex-direction:column;gap:10px;max-width:360px;margin:0 auto 32px;text-align:left;">
        <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;">
          <span style="font-size:18px;">◎</span><span style="font-size:14px;"><strong>4 multiple choice</strong> — pick the correct answer</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;">
          <span style="font-size:18px;">✏️</span><span style="font-size:14px;"><strong>1 written question</strong> — write your answer, then compare</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;">
          <span style="font-size:18px;">🎯</span><span style="font-size:14px;">Your <strong>RAG colour</strong> updates based on your score</span>
        </div>
      </div>
      <button class="btn-confirm show" onclick="startDiagnostic()" style="display:inline-block;width:auto;padding:16px 48px;">Start Diagnostic →</button>
    </div>`;
  renderMath();
}

function startDiagnostic() { renderQuestion(); }

function buildPips() {
  return questions.map((_, i) => {
    let cls = 'progress-pip';
    if (i < qIndex) { const r = results[i]; if (r) { cls += r.pts > 0 ? ' done-green' : ' done-miss'; } }
    else if (i === qIndex) cls += ' current';
    return `<div class="${cls}"></div>`;
  }).join('');
}

function renderQuestion() {
  selectedI = null;
  const q = questions[qIndex];
  const total = questions.length;
  const pct = (qIndex / total) * 100;
  const typeBadge = q.type === 'written' ? `<span class="q-type-badge written">✏️ Written</span>` : `<span class="q-type-badge mcq">◎ Multiple Choice</span>`;
  const marks = q.marks ? `<span class="q-marks">[${q.marks} marks]</span>` : '';
  wrapper.innerHTML = `
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-dots">${buildPips()}</div>
      <span class="progress-label">${qIndex + 1} / ${total}</span>
    </div>
    <div class="q-card">
      <div class="q-header">${typeBadge}${marks}</div>
      <div class="q-text">${q.q}</div>
      ${q.type === 'written' ? renderWritten(q) : renderMCQ(q)}
    </div>`;
  setTimeout(initCanvas, 50);
  renderMath();
}

function renderMCQ(q) {
  return `<div class="options" id="options">
    ${q.options.map((opt, i) => `<button class="option-btn" id="opt${i}" onclick="selectOption(${i})" data-idx="${i}"><span class="option-letter">${LETTERS[i]}</span><span>${opt}</span></button>`).join('')}
  </div>
  <div class="feedback-bar" id="feedbackBar"></div>
  <button class="btn-confirm" id="btnConfirm" onclick="confirmMCQ()">Confirm Answer</button>
  <button class="btn-next" id="btnNext" onclick="nextQuestion()">${qIndex + 1 < questions.length ? 'Next Question →' : 'See My Results →'}</button>`;
}

function renderWritten(q) {
  return `${q.diagram ? `<div class="diagram-area">
    <div class="draw-toolbar">
      <div class="tool-group">
        <button class="draw-btn active" id="toolPen" onclick="setTool('pen')" title="Pen">✏️</button>
        <button class="draw-btn" id="toolLine" onclick="setTool('line')" title="Line">📏</button>
        <button class="draw-btn" id="toolRect" onclick="setTool('rect')" title="Rectangle">⬜</button>
        <button class="draw-btn" id="toolCircle" onclick="setTool('circle')" title="Circle">⭕</button>
        <button class="draw-btn" id="toolArrow" onclick="setTool('arrow')" title="Arrow">➡️</button>
        <button class="draw-btn" id="toolText" onclick="setTool('text')" title="Text">🔤</button>
        <button class="draw-btn" id="toolEraser" onclick="setTool('eraser')" title="Eraser">🧹</button>
      </div>
      <div class="tool-group">
        <button class="color-swatch active" style="background:#0B1E3F" onclick="setColor('#0B1E3F')" data-color="#0B1E3F"></button>
        <button class="color-swatch" style="background:#DC2626" onclick="setColor('#DC2626')" data-color="#DC2626"></button>
        <button class="color-swatch" style="background:#16A34A" onclick="setColor('#16A34A')" data-color="#16A34A"></button>
        <button class="color-swatch" style="background:#2563EB" onclick="setColor('#2563EB')" data-color="#2563EB"></button>
        <button class="color-swatch" style="background:#D97706" onclick="setColor('#D97706')" data-color="#D97706"></button>
        <button class="color-swatch" style="background:#7C3AED" onclick="setColor('#7C3AED')" data-color="#7C3AED"></button>
      </div>
      <div class="tool-group">
        <span class="size-label" id="sizeLabel">2</span>
        <input type="range" class="size-slider" id="sizeSlider" min="1" max="12" value="2" oninput="setSize(this.value)">
      </div>
      <div class="tool-group">
        <button class="draw-btn-wide" onclick="undoDraw()">↩️ Undo</button>
        <button class="draw-btn-wide" onclick="redoDraw()">↪️ Redo</button>
        <button class="draw-btn-wide" onclick="clearCanvas()">🗑️ Clear</button>
      </div>
    </div>
    <div class="diagram-canvas-wrap"><canvas id="drawCanvas" width="700" height="300"></canvas></div>
  </div>
  <p class="diagram-label" id="diagramLabel">Use the drawing tools above to sketch your diagram</p>` : ''}
  <textarea class="written-area" id="writtenInput" placeholder="Write your answer here…"></textarea>
  <p class="written-hint">${q.diagram ? 'Draw your diagram above and write your explanation below.' : 'Write your answer above, then reveal the model answer to compare.'}</p>
  <button class="btn-reveal" id="btnReveal" onclick="revealModel()">Reveal Model Answer</button>
  <div id="modelAnswerWrap" style="display:none">
    <div class="model-answer-wrap">
      <div class="model-answer-label">📋 Model Answer</div>
      <div class="model-answer-text">${q.modelAnswer}</div>
    </div>
    <div class="self-mark-row">
      <button class="self-mark-btn full" onclick="selfMark('full')">✓ Full marks</button>
      <button class="self-mark-btn partial" onclick="selfMark('partial')">~ Partially right</button>
      <button class="self-mark-btn miss" onclick="selfMark('miss')">✗ Missed it</button>
    </div>
  </div>
  <button class="btn-next" id="btnNext" onclick="nextQuestion()">${qIndex + 1 < questions.length ? 'Next Question →' : 'See My Results →'}</button>`;
}

function selectOption(i) {
  if (document.getElementById('btnNext').classList.contains('show')) return;
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById(`opt${i}`).classList.add('selected');
  selectedI = i;
  document.getElementById('btnConfirm').classList.add('show');
}

function confirmMCQ() {
  if (selectedI === null) return;
  const q = questions[qIndex];
  const correct = selectedI === q.answer;
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
  document.getElementById('btnConfirm').style.display = 'none';
  document.getElementById(`opt${selectedI}`).classList.remove('selected');
  if (correct) { document.getElementById(`opt${selectedI}`).classList.add('correct'); }
  else { document.getElementById(`opt${selectedI}`).classList.add('wrong'); document.getElementById(`opt${q.answer}`).classList.add('reveal'); }
  const fb = document.getElementById('feedbackBar');
  fb.classList.add('show');
  if (correct) { fb.classList.add('correct-fb'); fb.textContent = '✓ Correct!'; }
  else { fb.classList.add('wrong-fb'); fb.innerHTML = `✗ Incorrect — correct answer: <strong>${q.options[q.answer]}</strong>${q.explanation ? `<div style="margin-top:8px;font-size:13px;line-height:1.6;opacity:0.95;border-top:1px solid rgba(255,255,255,0.2);padding-top:8px"><strong>Working:</strong> ${q.explanation}</div>` : ""}`; }
  results.push({ type: 'mcq', tier: q.tier, pts: correct ? W[q.tier] : 0, correct });
  document.getElementById('btnNext').classList.add('show');
}

function revealModel() {
  document.getElementById('btnReveal').style.display = 'none';
  document.getElementById('modelAnswerWrap').style.display = 'block';
  renderMath();

  const input = document.getElementById('writtenInput');
  const answerEmpty = !input || !input.value.trim();

  if (answerEmpty) {
    const q = questions[qIndex];
    results.push({ type: 'written', tier: q.tier, pts: 0, level: 'miss' });
    document.querySelectorAll('.self-mark-btn').forEach(b => { b.disabled = true; b.style.opacity = '0.5'; });
    const row = document.querySelector('.self-mark-row');
    if (row) {
      const note = document.createElement('p');
      note.style.cssText = 'font-size:13px;color:var(--red);margin-top:12px;text-align:center;width:100%;';
      note.textContent = 'No answer written — auto-marked 0. Review the model answer above.';
      row.parentNode.insertBefore(note, row.nextSibling);
    }
    document.getElementById('btnNext').classList.add('show');
  }
}

let drawState = { tool: 'pen', color: '#0B1E3F', size: 2, drawing: false, canvas: null, ctx: null, undoStack: [], redoStack: [], snapshot: null, startX: 0, startY: 0 };
function initCanvas() {
  const canvas = document.getElementById('drawCanvas'); if (!canvas) return;
  const wrap = canvas.parentElement; canvas.width = wrap.offsetWidth; canvas.height = 300;
  const ctx = canvas.getContext('2d'); ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  drawState = { ...drawState, canvas, ctx, undoStack: [], redoStack: [], drawing: false };
  saveUndoState();
  canvas.onmousedown = e => canvasDown(e.offsetX, e.offsetY);
  canvas.onmousemove = e => canvasMove(e.offsetX, e.offsetY);
  canvas.onmouseup = () => canvasUp();
  canvas.onmouseleave = () => { if (drawState.drawing) canvasUp(); };
  canvas.ontouchstart = e => { e.preventDefault(); const r = canvas.getBoundingClientRect(); canvasDown(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); };
  canvas.ontouchmove = e => { e.preventDefault(); const r = canvas.getBoundingClientRect(); canvasMove(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); };
  canvas.ontouchend = e => { e.preventDefault(); canvasUp(); };
}
function saveUndoState() { if (!drawState.canvas) return; drawState.undoStack.push(drawState.canvas.toDataURL()); if (drawState.undoStack.length > 30) drawState.undoStack.shift(); drawState.redoStack = []; }
function canvasDown(x, y) {
  const s = drawState;
  if (s.tool === 'text') { const t = prompt('Enter label:'); if (t) { s.ctx.font = `${Math.max(s.size * 4, 14)}px 'DM Sans',sans-serif`; s.ctx.fillStyle = s.color; s.ctx.fillText(t, x, y); saveUndoState(); } return; }
  s.drawing = true; s.startX = x; s.startY = y;
  s.snapshot = s.ctx.getImageData(0, 0, s.canvas.width, s.canvas.height);
  if (s.tool === 'pen' || s.tool === 'eraser') { s.ctx.beginPath(); s.ctx.moveTo(x, y); }
}
function canvasMove(x, y) {
  const s = drawState; if (!s.drawing) return;
  if (s.tool === 'pen' || s.tool === 'eraser') {
    s.ctx.strokeStyle = s.tool === 'eraser' ? '#fff' : s.color; s.ctx.lineWidth = s.tool === 'eraser' ? s.size * 6 : s.size;
    s.ctx.lineTo(x, y); s.ctx.stroke();
  } else {
    s.ctx.putImageData(s.snapshot, 0, 0); s.ctx.strokeStyle = s.color; s.ctx.lineWidth = s.size; s.ctx.beginPath();
    if (s.tool === 'line') { s.ctx.moveTo(s.startX, s.startY); s.ctx.lineTo(x, y); }
    else if (s.tool === 'rect') { s.ctx.rect(s.startX, s.startY, x - s.startX, y - s.startY); }
    else if (s.tool === 'circle') { const rx = Math.abs(x-s.startX)/2, ry = Math.abs(y-s.startY)/2, cx = s.startX+(x-s.startX)/2, cy = s.startY+(y-s.startY)/2; s.ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2); }
    else if (s.tool === 'arrow') { s.ctx.moveTo(s.startX,s.startY); s.ctx.lineTo(x,y); s.ctx.stroke(); const angle=Math.atan2(y-s.startY,x-s.startX),h=12+s.size*2; s.ctx.beginPath(); s.ctx.moveTo(x,y); s.ctx.lineTo(x-h*Math.cos(angle-0.4),y-h*Math.sin(angle-0.4)); s.ctx.moveTo(x,y); s.ctx.lineTo(x-h*Math.cos(angle+0.4),y-h*Math.sin(angle+0.4)); }
    s.ctx.stroke();
  }
}
function canvasUp() { if (!drawState.drawing) return; drawState.drawing = false; saveUndoState(); }
function setTool(t) { drawState.tool = t; document.querySelectorAll('.draw-btn').forEach(b => b.classList.remove('active')); const btn = document.getElementById('tool'+t.charAt(0).toUpperCase()+t.slice(1)); if (btn) btn.classList.add('active'); if (drawState.canvas) drawState.canvas.style.cursor = t === 'text' ? 'text' : t === 'eraser' ? 'cell' : 'crosshair'; }
function setColor(c) { drawState.color = c; document.querySelectorAll('.color-swatch').forEach(s => s.classList.toggle('active', s.dataset.color === c)); }
function setSize(v) { drawState.size = parseInt(v); document.getElementById('sizeLabel').textContent = v; }
function undoDraw() { const s = drawState; if (s.undoStack.length <= 1) return; s.redoStack.push(s.undoStack.pop()); const img = new Image(); img.onload = () => { s.ctx.clearRect(0,0,s.canvas.width,s.canvas.height); s.ctx.drawImage(img,0,0); }; img.src = s.undoStack[s.undoStack.length-1]; }
function redoDraw() { const s = drawState; if (!s.redoStack.length) return; const d = s.redoStack.pop(); s.undoStack.push(d); const img = new Image(); img.onload = () => { s.ctx.clearRect(0,0,s.canvas.width,s.canvas.height); s.ctx.drawImage(img,0,0); }; img.src = d; }
function clearCanvas() { const s = drawState; if (!s.canvas) return; s.ctx.fillStyle = '#fff'; s.ctx.fillRect(0,0,s.canvas.width,s.canvas.height); saveUndoState(); }

function selfMark(level) {
  const q = questions[qIndex];
  const pts = level === 'full' ? W.written_full : level === 'partial' ? W.written_partial : 0;
  results.push({ type: 'written', tier: q.tier, pts, level });
  document.querySelectorAll('.self-mark-btn').forEach(b => { b.disabled = true; b.style.opacity = '0.5'; });
  document.getElementById('btnNext').classList.add('show');
}

function nextQuestion() { qIndex++; if (qIndex < questions.length) renderQuestion(); else renderResult(); }

async function renderResult() {
  const rag = computeRag(results);
  const content = RAG[rag];
  const topicData = MATHS_EDEXCEL_QUESTIONS[topicKey];
  const chips = results.map((r, i) => {
    const label = r.type === 'written' ? (r.level === 'full' ? '✓ Written' : r.level === 'partial' ? '~ Written' : '✗ Written') : (r.correct ? `✓ Q${i+1}` : `✗ Q${i+1}`);
    const cls = r.pts > 0 ? 'hit-green' : 'miss';
    return `<span class="breakdown-chip ${cls}">${label}</span>`;
  }).join('');
  wrapper.innerHTML = `
    <div class="result-card">
      <div class="result-glow ${rag}">${content.emoji}</div>
      <div class="result-rag-label ${rag}">${content.label}</div>
      <div class="result-topic">${topicKey} — ${topicData.name}</div>
      <p class="result-desc">${content.desc}</p>
      <div class="result-breakdown">${chips}</div>
      <div class="saving-row" id="savingRow"><div class="spinner"></div> Saving result…</div>
      <div class="result-actions" id="resultActions" style="display:none">
        <a class="btn-primary" href="../Dashboard.html#diagnostic=Mathematics_Edexcel">← Back to diagnostics</a>
        <a class="btn-outline" href="../Dashboard.html">Back to Dashboard</a>
      </div>
    </div>`;
  renderMath();
  await saveResult(rag, results);
  sessionStorage.removeItem(`diag_maths_edexcel_${topicKey}`);
  document.getElementById('savingRow').style.display = 'none';
  document.getElementById('resultActions').style.display = 'flex';
}

async function saveResult(rag, results) {
  if (!user) return;
  const now = new Date().toISOString();
  try {
    await supabaseClient.from('topic_progress').delete().eq('user_id', user.id).eq('subject', 'Mathematics').eq('exam_board', 'Edexcel').eq('topic', topicKey);
    await supabaseClient.from('topic_progress').insert({ user_id: user.id, subject: 'Mathematics', exam_board: 'Edexcel', topic: topicKey, rag_status: rag, updated_at: now });
    const { data: allTopics } = await supabaseClient.from('topic_progress').select('rag_status').eq('user_id', user.id).eq('subject', 'Mathematics').eq('exam_board', 'Edexcel');
    if (allTopics && allTopics.length > 0) {
      const total = allTopics.length, green = allTopics.filter(t => t.rag_status === 'green').length, red = allTopics.filter(t => t.rag_status === 'red').length;
      const subjRag = (green/total) >= 0.7 ? 'green' : (red/total) >= 0.4 ? 'red' : 'amber';
      await supabaseClient.from('user_subjects').update({ rag_status: subjRag }).eq('user_id', user.id).eq('subject', 'Mathematics').eq('exam_board', 'Edexcel');
    }
  } catch(err) { console.error('SAVE error', err); if (window.notifyError) window.notifyError('Progress not saved — please check your connection and try again.'); }
}

function showError(msg) {
  wrapper.innerHTML = `<div class="screen-center"><div class="screen-icon">⚠️</div><div class="screen-title">Something went wrong</div><p class="screen-sub" style="margin:8px 0 24px">${msg}</p><a class="btn-primary" href="../Dashboard.html">← Back to Dashboard</a></div>`;
}

init();
</script>
