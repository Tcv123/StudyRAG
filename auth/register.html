<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG Learning — Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase-config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #EEF5FC;
      --surface: #FFFFFF;
      --surface2: #F4F9FE;
      --border: #D2E5F3;
      --border-hover: #93C4E2;
      --text: #1B2D4F;
      --muted: #6B87A8;
      --muted2: #A0B8CE;
      --accent: #5BADCF;
      --accent-dark: #3D95BC;
      --accent-dim: rgba(91,173,207,0.1);
      --accent-glow: rgba(91,173,207,0.2);
      --red: #DC2626;
      --red-bg: rgba(220,38,38,0.07);
      --red-border: rgba(220,38,38,0.18);
      --red-text: #B91C1C;
      --green: #16A34A;
      --green-bg: rgba(22,163,74,0.07);
      --green-border: rgba(22,163,74,0.18);
      --green-text: #15803D;
      --font-display: 'DM Serif Display', serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(91,173,207,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91,173,207,0.06) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none; z-index: 0;
    }

    .layout {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 48px 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%; max-width: 440px;
      box-shadow: 0 4px 32px rgba(91,173,207,0.12);
      animation: fadeUp 0.5s ease both;
    }

    .logo {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 28px;
    }

    .logo-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    .logo-name {
      font-family: var(--font-display);
      font-size: 18px; color: var(--text); letter-spacing: -0.01em;
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 26px; color: var(--text);
      letter-spacing: -0.02em; margin-bottom: 6px;
    }

    .card-sub {
      font-size: 14px; color: var(--muted); margin-bottom: 28px;
    }

    .card-sub a { color: var(--accent-dark); text-decoration: none; font-weight: 500; }
    .card-sub a:hover { text-decoration: underline; }

    .name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .field { margin-bottom: 14px; }

    label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--muted); margin-bottom: 6px;
      letter-spacing: 0.04em; text-transform: uppercase;
    }

    input {
      width: 100%; padding: 11px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text); font-family: var(--font-body); font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder { color: var(--muted2); }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
      background: #fff;
    }

    .pw-strength { margin-top: 6px; display: flex; gap: 4px; }
    .pw-bar { flex: 1; height: 3px; border-radius: 2px; background: var(--border); transition: background 0.3s; }
    .pw-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .btn {
      width: 100%; padding: 13px; border: none; border-radius: 10px;
      font-family: var(--font-body); font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; margin-top: 6px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      box-shadow: 0 4px 14px var(--accent-glow);
    }

    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--accent-glow); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .msg {
      margin-top: 14px; font-size: 13px; text-align: center;
      border-radius: 8px; min-height: 18px; padding: 0;
      transition: all 0.2s;
    }

    .msg:not(:empty) { padding: 10px 14px; }
    .msg.error   { color: var(--red-text);   background: var(--red-bg);   border: 1px solid var(--red-border); }
    .msg.success { color: var(--green-text); background: var(--green-bg); border: 1px solid var(--green-border); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="layout">
  <div class="card">
    <div class="logo">
      <div class="logo-dot"></div>
      <div class="logo-name">RAG Learning</div>
    </div>

    <div class="card-title">Create your account</div>
    <p class="card-sub">Already have one? <a href="login.html">Sign in</a></p>

    <form id="form">
      <div class="name-row">
        <div class="field">
          <label for="firstName">First name</label>
          <input id="firstName" placeholder="Jane" required>
        </div>
        <div class="field">
          <label for="lastName">Last name</label>
          <input id="lastName" placeholder="Doe" required>
        </div>
      </div>

      <div class="field">
        <label for="email">Email address</label>
        <input id="email" type="email" placeholder="you@example.com" required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="At least 6 characters" required oninput="checkPw(this.value)">
        <div class="pw-strength">
          <div class="pw-bar" id="b1"></div>
          <div class="pw-bar" id="b2"></div>
          <div class="pw-bar" id="b3"></div>
          <div class="pw-bar" id="b4"></div>
        </div>
        <div class="pw-label" id="pwLabel"></div>
      </div>

      <button class="btn btn-primary" id="registerBtn">Create Account</button>
    </form>

    <p id="msg" class="msg"></p>
  </div>
</div>

<script>
function checkPw(val) {
  const bars   = [b1, b2, b3, b4];
  const colors = ['#DC2626','#D97706','#5BADCF','#16A34A'];
  const labels = ['Too short','Weak','Good','Strong'];
  let score = 0;
  if (val.length >= 6)           score++;
  if (/[A-Z]/.test(val))         score++;
  if (/[0-9]/.test(val))         score++;
  if (/[^A-Za-z0-9]/.test(val))  score++;
  bars.forEach((b, i) => b.style.background = i < score ? colors[score - 1] : 'var(--border)');
  pwLabel.textContent  = val.length ? labels[score - 1] || '' : '';
  pwLabel.style.color  = score > 0 ? colors[score - 1] : 'var(--muted)';
}

const form        = document.getElementById('form');
const msg         = document.getElementById('msg');
const registerBtn = document.getElementById('registerBtn');

form.onsubmit = async (e) => {
  e.preventDefault();
  registerBtn.disabled    = true;
  registerBtn.textContent = 'Creating account…';
  msg.className = 'msg';
  msg.innerText = '';

  // 1 — Sign up (email confirmation must be OFF in Supabase Auth settings)
  const { data, error } = await supabaseClient.auth.signUp({
    email:    email.value.trim(),
    password: password.value,
    options: {
      data: {
        first_name: firstName.value.trim(),
        last_name:  lastName.value.trim()
      }
    }
  });

  if (error) {
    msg.className       = 'msg error';
    msg.innerText       = error.message;
    registerBtn.disabled    = false;
    registerBtn.textContent = 'Create Account';
    return;
  }

  // 2 — Create the profile row immediately (works when email confirm is off)
  if (data.user) {
    await supabaseClient.from('profiles').upsert({
      id:             data.user.id,
      first_name:     firstName.value.trim(),
      last_name:      lastName.value.trim(),
      email:          email.value.trim(),
      setup_complete: false
    });
  }

  // 3 — If we got a session straight away → go to setup
  if (data.session) {
    window.location = 'setup.html';
    return;
  }

  // 4 — Email confirmation is still on — ask them to sign in after confirming
  msg.className   = 'msg success';
  msg.innerText   = 'Account created! Check your email to confirm, then sign in.';
  registerBtn.disabled    = false;
  registerBtn.textContent = 'Create Account';
};
</script>
</body>
</html>
