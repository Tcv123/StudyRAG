<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; base-uri 'self'; form-action 'self'">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <title>RAG Learning — Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase-config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #EAF2FC;
      --surface: #FFFFFF;
      --surface2: #F0F6FD;
      --border: #B8D0E8;
      --border-hover: #2563EB;
      --text: #0B1E3F;
      --muted: #445F85;
      --muted2: #7891B0;
      --accent: #2563EB;
      --accent-dark: #1D4ED8;
      --accent-dim: rgba(37,99,235,0.1);
      --accent-glow: rgba(37,99,235,0.2);
      --red: #DC2626;
      --red-bg: rgba(220,38,38,0.07);
      --red-border: rgba(220,38,38,0.18);
      --red-text: #B91C1C;
      --green: #16A34A;
      --green-bg: rgba(22,163,74,0.07);
      --green-border: rgba(22,163,74,0.18);
      --green-text: #15803D;
      --font-display: 'DM Serif Display', serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html, body {
      min-height: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(37,99,235,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,0.06) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none; z-index: 0;
    }

    .layout {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 48px 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 52px 52px;
      width: 100%; max-width: 460px;
      box-shadow: 0 4px 32px rgba(37,99,235,0.12);
      animation: fadeUp 0.5s ease both;
    }

    .logo { display: flex; align-items: center; gap: 8px; margin-bottom: 36px; }
    .logo-img { width: 24px; height: 24px; display: inline-block; vertical-align: middle; flex-shrink: 0; }
    .logo-name { font-family: var(--font-display); font-size: 18px; color: var(--text); letter-spacing: -0.01em; }

    .card-title { font-family: var(--font-display); font-size: 28px; color: var(--text); letter-spacing: -0.02em; margin-bottom: 8px; }
    .card-sub { font-size: 14px; color: var(--muted); margin-bottom: 36px; line-height: 1.5; }
    .card-sub a { color: var(--accent-dark); text-decoration: none; font-weight: 500; }
    .card-sub a:hover { text-decoration: underline; }

    .field { margin-bottom: 20px; }

    label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--muted); margin-bottom: 8px;
      letter-spacing: 0.04em; text-transform: uppercase;
    }

    input {
      width: 100%; padding: 13px 15px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text); font-family: var(--font-body); font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder { color: var(--muted2); }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); background: #fff; }

    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      font-family: var(--font-body); font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; margin-top: 14px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff; box-shadow: 0 4px 14px var(--accent-glow);
    }

    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--accent-glow); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .msg {
      margin-top: 14px; font-size: 13px; text-align: center;
      border-radius: 8px; min-height: 18px; padding: 0;
      transition: all 0.2s;
    }

    .msg:not(:empty) { padding: 10px 14px; }
    .msg.error   { color: var(--red-text);   background: var(--red-bg);   border: 1px solid var(--red-border); }
    .msg.success { color: var(--green-text); background: var(--green-bg); border: 1px solid var(--green-border); }

    .success-step { text-align: center; animation: fadeUp 0.4s ease both; }

    .check-circle {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--green-bg); border: 2px solid var(--green-border);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; color: var(--green-text);
    }
    .check-circle svg { width: 30px; height: 30px; }

    .success-step h2 { font-family: var(--font-display); font-size: 24px; color: var(--text); margin-bottom: 10px; }
    .success-step p { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }

    .email-pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 14px; background: var(--green-bg);
      border: 1px solid var(--green-border); border-radius: 20px;
      color: var(--green-text); font-size: 13px; font-weight: 500;
      margin-bottom: 24px;
    }
    .email-pill svg { width: 14px; height: 14px; }

    .back-home-wrap {
      margin-top: 32px; padding-top: 24px;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .back-home {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted); text-decoration: none;
      font-weight: 500;
      padding: 6px 12px; border-radius: 8px;
      transition: all 0.2s;
    }
    .back-home:hover { color: var(--accent-dark); background: var(--accent-dim); }
    .back-home svg { width: 14px; height: 14px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="layout">
  <div class="card">
    <div class="logo">
      <img src="../favicon.svg" alt="RAG Learning" class="logo-img" />
      <div class="logo-name">RAG Learning</div>
    </div>

    <div id="requestStep">
      <div class="card-title">Reset your password</div>
      <p class="card-sub">Enter your email and we'll send you a link to set a new password.</p>

      <form id="form">
        <div class="field">
          <label for="email">Email address</label>
          <input id="email" type="email" placeholder="you@example.com" required autocomplete="email" autofocus>
        </div>

        <button class="btn btn-primary" id="sendBtn">Send reset link</button>
      </form>

      <p id="msg" class="msg"></p>
    </div>

    <div id="successStep" class="success-step" style="display:none;">
      <div class="check-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>

      <h2>Check your inbox</h2>
      <p>We've emailed a password reset link to</p>

      <div class="email-pill">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span id="sentEmail"></span>
      </div>

      <p style="font-size:13px;">Click the link in that email to choose a new password. If you don't see it within a few minutes, check your spam folder.</p>
    </div>

    <div class="back-home-wrap">
      <a href="login.html" class="back-home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
        Back to sign in
      </a>
    </div>
  </div>
</div>

<script>
const form    = document.getElementById('form');
const msg     = document.getElementById('msg');
const sendBtn = document.getElementById('sendBtn');
const emailEl = document.getElementById('email');

form.onsubmit = async (e) => {
  e.preventDefault();
  sendBtn.disabled    = true;
  sendBtn.textContent = 'Sending…';
  msg.className = 'msg';
  msg.innerText = '';

  const email = emailEl.value.trim();
  const redirectTo = window.location.origin + window.location.pathname.replace(/forgot-password\.html$/, 'reset-password.html');

  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, { redirectTo });

  if (error) {
    msg.className       = 'msg error';
    msg.innerText       = error.message;
    sendBtn.disabled    = false;
    sendBtn.textContent = 'Send reset link';
    return;
  }

  document.getElementById('sentEmail').textContent = email;
  document.getElementById('requestStep').style.display = 'none';
  document.getElementById('successStep').style.display = 'block';
};
</script>
</body>
</html>
