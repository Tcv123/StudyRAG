<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>RAG Learning — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase-config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #EEF5FC;
      --surface: #FFFFFF;
      --surface2: #F4F9FE;
      --border: #D2E5F3;
      --border-hover: #93C4E2;
      --text: #1B2D4F;
      --muted: #6B87A8;
      --muted2: #A0B8CE;
      --accent: #5BADCF;
      --accent-dark: #3D95BC;
      --accent-dim: rgba(91,173,207,0.1);
      --accent-glow: rgba(91,173,207,0.2);
      --red: #DC2626;
      --red-bg: rgba(220,38,38,0.07);
      --red-border: rgba(220,38,38,0.18);
      --red-text: #B91C1C;
      --green: #16A34A;
      --green-bg: rgba(22,163,74,0.07);
      --green-border: rgba(22,163,74,0.18);
      --green-text: #15803D;
      --font-display: 'DM Serif Display', serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html, body {
      min-height: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(91,173,207,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91,173,207,0.06) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none; z-index: 0;
    }

    .layout {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 48px 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%; max-width: 420px;
      box-shadow: 0 4px 32px rgba(91,173,207,0.12);
      animation: fadeUp 0.5s ease both;
    }

    .logo {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 28px;
    }

    .logo-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    .logo-name {
      font-family: var(--font-display);
      font-size: 18px; color: var(--text); letter-spacing: -0.01em;
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 26px; color: var(--text);
      letter-spacing: -0.02em; margin-bottom: 6px;
    }

    .card-sub {
      font-size: 14px; color: var(--muted); margin-bottom: 28px;
    }

    .card-sub a { color: var(--accent-dark); text-decoration: none; font-weight: 500; }
    .card-sub a:hover { text-decoration: underline; }

    .back-home-wrap {
      margin-top: 24px; padding-top: 20px;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .back-home {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted); text-decoration: none;
      font-weight: 500;
      padding: 6px 12px; border-radius: 8px;
      transition: all 0.2s;
    }
    .back-home:hover { color: var(--accent-dark); background: var(--accent-dim); }
    .back-home svg { width: 14px; height: 14px; }

    .field { margin-bottom: 14px; }

    .input-wrap { position: relative; }

    .toggle-pw {
      position: absolute; top: 50%; right: 38px;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      padding: 6px; border-radius: 6px;
      color: var(--muted2); transition: color 0.2s, background 0.2s;
    }
    .toggle-pw:hover { color: var(--accent-dark); background: var(--accent-dim); }
    .toggle-pw svg { width: 18px; height: 18px; }
    .input-wrap input { padding-right: 70px; }

    .field-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 6px;
    }

    label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--muted); margin-bottom: 6px;
      letter-spacing: 0.04em; text-transform: uppercase;
    }

    .field-row label { margin-bottom: 0; }

    .forgot { font-size: 12px; color: var(--accent-dark); text-decoration: none; font-weight: 500; }
    .forgot:hover { text-decoration: underline; }

    input {
      width: 100%; padding: 12px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text); font-family: var(--font-body); font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder { color: var(--muted2); }

    input::-ms-reveal,
    input::-ms-clear { display: none; }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
      background: #fff;
    }

    .btn {
      width: 100%; padding: 13px; border: none; border-radius: 10px;
      font-family: var(--font-body); font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; margin-top: 6px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      box-shadow: 0 4px 14px var(--accent-glow);
    }

    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--accent-glow); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--muted2); font-size: 12px;
    }

    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .msg {
      margin-top: 14px; font-size: 13px; text-align: center;
      border-radius: 8px; min-height: 18px; padding: 0;
      transition: all 0.2s;
    }

    .msg:not(:empty) { padding: 10px 14px; }
    .msg.error   { color: var(--red-text);   background: var(--red-bg);   border: 1px solid var(--red-border); }
    .msg.success { color: var(--green-text); background: var(--green-bg); border: 1px solid var(--green-border); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="layout">
  <div class="card">
    <div class="logo">
      <div class="logo-dot"></div>
      <div class="logo-name">RAG Learning</div>
    </div>

    <div class="card-title">Welcome back</div>
    <p class="card-sub">Don't have an account? <a href="register.html">Sign up free</a></p>

    <form id="form">
      <div class="field">
        <label for="email">Email address</label>
        <input id="email" type="email" placeholder="you@example.com" required autocomplete="email">
      </div>

      <div class="field">
        <div class="field-row">
          <label for="password">Password</label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>
        <div class="input-wrap">
          <input id="password" type="password" placeholder="Enter your password" required autocomplete="current-password">
          <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password" aria-pressed="false">
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button class="btn btn-primary" id="loginBtn">Sign In</button>
    </form>

    <p id="msg" class="msg"></p>

    <div class="divider">or</div>

    <div style="text-align:center; font-size:13px; color:var(--muted);">
      New here? <a href="register.html" style="color:var(--accent-dark);font-weight:500;text-decoration:none;">Create a free account</a>
    </div>

    <div class="back-home-wrap">
      <a href="../index.html" class="back-home" aria-label="Back to homepage">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
        Back to homepage
      </a>
    </div>
  </div>
</div>

<script>
const form     = document.getElementById('form');
const msg      = document.getElementById('msg');
const loginBtn = document.getElementById('loginBtn');
const togglePw = document.getElementById('togglePw');
const pwInput  = document.getElementById('password');
const eyeIcon  = document.getElementById('eyeIcon');

const EYE_OPEN  = '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>';
const EYE_CLOSED = '<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/>';

togglePw.addEventListener('click', () => {
  const showing = pwInput.type === 'text';
  pwInput.type = showing ? 'password' : 'text';
  togglePw.setAttribute('aria-pressed', String(!showing));
  togglePw.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
  eyeIcon.innerHTML = showing ? EYE_OPEN : EYE_CLOSED;
});

// Show a success banner when the user arrives from the confirmation email link
if (new URLSearchParams(window.location.search).get('confirmed') === '1') {
  msg.className = 'msg success';
  msg.innerText = 'Email confirmed! You can now sign in.';
}

form.onsubmit = async (e) => {
  e.preventDefault();
  loginBtn.disabled    = true;
  loginBtn.textContent = 'Signing in…';
  msg.className = 'msg';
  msg.innerText = '';

  // 1 — Authenticate
  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email:    email.value.trim(),
    password: password.value
  });

  if (error) {
    msg.className = 'msg error';
    if (/confirm/i.test(error.message) || error.code === 'email_not_confirmed') {
      msg.innerText = 'Please confirm your email first — check your inbox for the confirmation link.';
    } else {
      msg.innerText = error.message;
    }
    loginBtn.disabled    = false;
    loginBtn.textContent = 'Sign In';
    return;
  }

  // 2 — Create profile row only if it doesn't already exist (preserve user edits)
  await supabaseClient.from('profiles').upsert({
    id:         data.user.id,
    first_name: data.user.user_metadata?.first_name || '',
    last_name:  data.user.user_metadata?.last_name  || '',
    email:      data.user.email
  }, { onConflict: 'id', ignoreDuplicates: true });

  window.location = '../Dashboard.html';
};
</script>
</body>
</html>
