<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; base-uri 'self'; form-action 'self'">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <title>RAG Learning — Verify Email</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase-config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #EAF2FC;
      --surface: #FFFFFF;
      --surface2: #F0F6FD;
      --border: #B8D0E8;
      --text: #0B1E3F;
      --muted: #445F85;
      --muted2: #7891B0;
      --accent: #2563EB;
      --accent-dark: #1D4ED8;
      --accent-dim: rgba(37,99,235,0.1);
      --accent-glow: rgba(37,99,235,0.2);
      --red: #DC2626;
      --red-bg: rgba(220,38,38,0.07);
      --red-border: rgba(220,38,38,0.18);
      --red-text: #B91C1C;
      --green: #16A34A;
      --green-bg: rgba(22,163,74,0.07);
      --green-border: rgba(22,163,74,0.18);
      --green-text: #15803D;
      --font-display: 'DM Serif Display', serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html, body {
      min-height: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(37,99,235,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,0.06) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none; z-index: 0;
    }

    .layout {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 48px 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 52px 52px;
      width: 100%; max-width: 460px;
      box-shadow: 0 4px 32px rgba(37,99,235,0.12);
      animation: fadeUp 0.5s ease both;
    }

    .logo {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 36px;
    }

    .logo-img { width: 24px; height: 24px; display: inline-block; vertical-align: middle; flex-shrink: 0; }

    .logo-name {
      font-family: var(--font-display);
      font-size: 18px; color: var(--text); letter-spacing: -0.01em;
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 28px; color: var(--text);
      letter-spacing: -0.02em; margin-bottom: 8px;
    }

    .card-sub {
      font-size: 14px; color: var(--muted); margin-bottom: 36px; line-height: 1.5;
    }

    .card-sub a { color: var(--accent-dark); text-decoration: none; font-weight: 500; }
    .card-sub a:hover { text-decoration: underline; }

    .field { margin-bottom: 20px; }

    label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--muted); margin-bottom: 8px;
      letter-spacing: 0.04em; text-transform: uppercase;
    }

    input {
      width: 100%; padding: 13px 15px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text); font-family: var(--font-body); font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder { color: var(--muted2); }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
      background: #fff;
    }

    .otp-input {
      padding: 16px;
      font-size: 26px;
      font-weight: 600;
      text-align: center;
      letter-spacing: 0.35em;
    }
    .otp-input::placeholder { color: var(--muted2); letter-spacing: 0.25em; font-weight: 400; }

    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      font-family: var(--font-body); font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; margin-top: 14px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      box-shadow: 0 4px 14px var(--accent-glow);
    }

    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--accent-glow); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .link-btn {
      background: none; border: none; padding: 0;
      color: var(--accent-dark); font-family: var(--font-body);
      font-size: 13px; font-weight: 500; cursor: pointer;
      text-decoration: none;
    }
    .link-btn:hover { text-decoration: underline; }
    .link-btn:disabled { color: var(--muted2); cursor: not-allowed; text-decoration: none; }

    .otp-actions {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 14px; font-size: 13px; color: var(--muted);
    }

    /* ── SUCCESS STEP ── */
    .success-step { text-align: center; }

    .check-circle {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(22,163,74,0.08);
      border: 2px solid rgba(22,163,74,0.25);
      margin: 0 auto 24px;
      display: flex; align-items: center; justify-content: center;
      animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .check-circle svg {
      width: 40px; height: 40px;
      color: var(--green);
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: draw 0.5s ease 0.3s forwards;
    }

    .success-step h2 {
      font-family: var(--font-display);
      font-size: 26px; color: var(--text);
      letter-spacing: -0.02em; margin-bottom: 10px;
    }

    .success-step p {
      font-size: 14px; color: var(--muted);
      line-height: 1.55; margin-bottom: 28px;
    }

    .email-pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 13px; color: var(--text);
      margin-bottom: 24px;
    }
    .email-pill svg { width: 14px; height: 14px; color: var(--green); }

    @keyframes pop {
      0%   { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    .msg {
      margin-top: 14px; font-size: 13px; text-align: center;
      border-radius: 8px; min-height: 18px; padding: 0;
      transition: all 0.2s;
    }

    .msg:not(:empty) { padding: 10px 14px; }
    .msg.error   { color: var(--red-text);   background: var(--red-bg);   border: 1px solid var(--red-border); }
    .msg.success { color: var(--green-text); background: var(--green-bg); border: 1px solid var(--green-border); }

    .back-home-wrap {
      margin-top: 32px; padding-top: 24px;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .back-home {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted); text-decoration: none;
      font-weight: 500;
      padding: 6px 12px; border-radius: 8px;
      transition: all 0.2s;
    }
    .back-home:hover { color: var(--accent-dark); background: var(--accent-dim); }
    .back-home svg { width: 14px; height: 14px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="layout">
  <div class="card">
    <div class="logo">
      <img src="../favicon.svg" alt="RAG Learning" class="logo-img" />
      <div class="logo-name">RAG Learning</div>
    </div>

    <div class="card-title">Verify your email</div>
    <p class="card-sub">Enter the 8-digit code we sent you. Wrong account? <a href="register.html">Start over</a></p>

    <form id="form">
      <div class="field">
        <label for="email">Email address</label>
        <input id="email" type="email" placeholder="you@example.com" required autocomplete="email">
      </div>

      <div class="field">
        <label for="otp">Verification code</label>
        <input id="otp" class="otp-input" type="text" inputmode="numeric" autocomplete="one-time-code"
               maxlength="8" pattern="[0-9]{8}" placeholder="00000000" required>
      </div>

      <button class="btn btn-primary" id="verifyBtn">Verify & Continue</button>

      <div class="otp-actions">
        <span>Didn't get it?</span>
        <button type="button" class="link-btn" id="resendBtn">Resend code</button>
      </div>
    </form>

    <div id="successStep" class="success-step" style="display:none;">
      <div class="check-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>

      <h2>Email verified</h2>
      <p>Your account is all set. Let's get your profile set up so you can start learning.</p>

      <div class="email-pill">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span id="successEmail"></span>
      </div>

      <a href="setup.html" class="btn btn-primary" style="display:block;text-decoration:none;text-align:center;">Set up your profile</a>
    </div>

    <p id="msg" class="msg"></p>

    <div class="back-home-wrap">
      <a href="../index.html" class="back-home" aria-label="Back to homepage">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
        Back to homepage
      </a>
    </div>
  </div>
</div>

<script>
const form      = document.getElementById('form');
const msg       = document.getElementById('msg');
const emailEl   = document.getElementById('email');
const otpInput  = document.getElementById('otp');
const verifyBtn = document.getElementById('verifyBtn');
const resendBtn = document.getElementById('resendBtn');

// Pre-fill email from ?email= URL param
const params = new URLSearchParams(window.location.search);
const preEmail = params.get('email');
if (preEmail) {
  emailEl.value = preEmail;
  otpInput.focus();
}

otpInput.addEventListener('input', () => {
  otpInput.value = otpInput.value.replace(/\D/g, '').slice(0, 8);
});

form.onsubmit = async (e) => {
  e.preventDefault();
  verifyBtn.disabled    = true;
  verifyBtn.textContent = 'Verifying…';
  msg.className = 'msg';
  msg.innerText = '';

  const { error } = await supabaseClient.auth.verifyOtp({
    email: emailEl.value.trim(),
    token: otpInput.value.trim(),
    type:  'signup'
  });

  if (error) {
    msg.className = 'msg error';
    msg.innerText = /expired|invalid/i.test(error.message)
      ? 'That code is invalid or expired. Request a new one.'
      : error.message;
    verifyBtn.disabled    = false;
    verifyBtn.textContent = 'Verify & Continue';
    return;
  }

  form.style.display = 'none';
  document.getElementById('successEmail').textContent = emailEl.value.trim();
  document.getElementById('successStep').style.display = 'block';
};

let resendCooldown = 0;
resendBtn.addEventListener('click', async () => {
  if (resendCooldown > 0) return;
  if (!emailEl.value.trim()) {
    msg.className = 'msg error';
    msg.innerText = 'Enter your email first.';
    emailEl.focus();
    return;
  }

  resendBtn.disabled = true;
  msg.className = 'msg';
  msg.innerText = '';

  const { error } = await supabaseClient.auth.resend({
    type:  'signup',
    email: emailEl.value.trim()
  });

  if (error) {
    msg.className = 'msg error';
    msg.innerText = error.message;
    resendBtn.disabled = false;
    return;
  }

  msg.className = 'msg success';
  msg.innerText = 'New code sent. Check your inbox.';

  resendCooldown = 30;
  const tick = () => {
    if (resendCooldown <= 0) {
      resendBtn.textContent = 'Resend code';
      resendBtn.disabled    = false;
      return;
    }
    resendBtn.textContent = `Resend code (${resendCooldown}s)`;
    resendCooldown--;
    setTimeout(tick, 1000);
  };
  tick();
});
</script>
</body>
</html>
