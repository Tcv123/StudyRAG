<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; base-uri 'self'; form-action 'self'">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <title>RAG Learning — Email Confirmed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase-config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #EAF2FC;
      --surface: #FFFFFF;
      --surface2: #F0F6FD;
      --border: #B8D0E8;
      --text: #0B1E3F;
      --muted: #445F85;
      --muted2: #7891B0;
      --accent: #2563EB;
      --accent-dark: #1D4ED8;
      --accent-dim: rgba(37,99,235,0.1);
      --accent-glow: rgba(37,99,235,0.2);
      --green: #16A34A;
      --green-bg: rgba(22,163,74,0.08);
      --green-border: rgba(22,163,74,0.25);
      --red: #DC2626;
      --red-bg: rgba(220,38,38,0.07);
      --red-border: rgba(220,38,38,0.18);
      --red-text: #B91C1C;
      --font-display: 'DM Serif Display', serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html, body {
      min-height: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(37,99,235,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,0.06) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none; z-index: 0;
    }

    .layout {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 48px 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 56px 44px;
      width: 100%; max-width: 440px;
      text-align: center;
      box-shadow: 0 4px 32px rgba(37,99,235,0.12);
      animation: fadeUp 0.5s ease both;
    }

    .logo {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-bottom: 32px;
    }

    .logo-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    .logo-name {
      font-family: var(--font-display);
      font-size: 18px; color: var(--text); letter-spacing: -0.01em;
    }

    .check-circle {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: var(--green-bg);
      border: 2px solid var(--green-border);
      margin: 0 auto 24px;
      display: flex; align-items: center; justify-content: center;
      animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
    }

    .check-circle svg {
      width: 40px; height: 40px;
      color: var(--green);
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: draw 0.5s ease 0.5s forwards;
    }

    .title {
      font-family: var(--font-display);
      font-size: 28px; color: var(--text);
      letter-spacing: -0.02em; margin-bottom: 10px;
    }

    .subtitle {
      font-size: 15px; color: var(--muted);
      line-height: 1.5;
      margin-bottom: 28px;
    }

    .status {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--muted);
      padding: 10px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
    }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      margin-top: 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      border: none; border-radius: 10px;
      font-family: var(--font-body); font-size: 14px; font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      box-shadow: 0 4px 14px var(--accent-glow);
    }

    .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--accent-glow); }

    .error-box {
      margin-top: 20px;
      padding: 12px 16px;
      background: var(--red-bg);
      border: 1px solid var(--red-border);
      border-radius: 10px;
      font-size: 13px;
      color: var(--red-text);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pop {
      0%   { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
<div class="layout">
  <div class="card">
    <div class="logo">
      <div class="logo-dot"></div>
      <div class="logo-name">RAG Learning</div>
    </div>

    <div class="check-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>

    <div class="title">Email verified</div>
    <p class="subtitle" id="subtitle">Your account is ready to go. Taking you to setup…</p>

    <div class="status" id="status">
      <div class="spinner"></div>
      <span id="statusText">Signing you in…</span>
    </div>

    <div id="errorWrap" style="display:none;">
      <div class="error-box" id="errorMsg"></div>
      <a href="login.html" class="btn">Go to sign in</a>
    </div>
  </div>
</div>

<script>
(async () => {
  const statusText = document.getElementById('statusText');
  const status     = document.getElementById('status');
  const subtitle   = document.getElementById('subtitle');
  const errorWrap  = document.getElementById('errorWrap');
  const errorMsg   = document.getElementById('errorMsg');

  const showError = (text) => {
    status.style.display    = 'none';
    subtitle.textContent    = 'Something went wrong.';
    errorMsg.textContent    = text;
    errorWrap.style.display = 'block';
  };

  // Supabase SDK auto-parses the hash fragment (#access_token=…) on load.
  // Give it a tick, then check the session.
  await new Promise(r => setTimeout(r, 400));

  const { data: { session }, error } = await supabaseClient.auth.getSession();

  if (error) {
    showError(error.message);
    return;
  }

  if (!session) {
    showError('We couldn\'t sign you in automatically. Please log in with your password.');
    return;
  }

  // Decide destination: setup if profile incomplete, dashboard otherwise
  const { data: profile } = await supabaseClient
    .from('profiles')
    .select('setup_complete')
    .eq('id', session.user.id)
    .maybeSingle();

  const target = profile?.setup_complete ? '../Dashboard.html' : 'setup.html';

  statusText.textContent = 'Redirecting…';
  setTimeout(() => { window.location = target; }, 800);
})();
</script>
</body>
</html>
