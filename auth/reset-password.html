<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; base-uri 'self'; form-action 'self'">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>RAG Learning — Set New Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase-config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #EEF5FC;
      --surface: #FFFFFF;
      --surface2: #F4F9FE;
      --border: #D2E5F3;
      --border-hover: #93C4E2;
      --text: #1B2D4F;
      --muted: #6B87A8;
      --muted2: #A0B8CE;
      --accent: #5BADCF;
      --accent-dark: #3D95BC;
      --accent-dim: rgba(91,173,207,0.1);
      --accent-glow: rgba(91,173,207,0.2);
      --red: #DC2626;
      --red-bg: rgba(220,38,38,0.07);
      --red-border: rgba(220,38,38,0.18);
      --red-text: #B91C1C;
      --green: #16A34A;
      --green-bg: rgba(22,163,74,0.07);
      --green-border: rgba(22,163,74,0.18);
      --green-text: #15803D;
      --font-display: 'DM Serif Display', serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html, body {
      min-height: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(91,173,207,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91,173,207,0.06) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none; z-index: 0;
    }

    .layout {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 48px 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 52px 52px;
      width: 100%; max-width: 460px;
      box-shadow: 0 4px 32px rgba(91,173,207,0.12);
      animation: fadeUp 0.5s ease both;
    }

    .logo { display: flex; align-items: center; gap: 8px; margin-bottom: 36px; }
    .logo-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
    .logo-name { font-family: var(--font-display); font-size: 18px; color: var(--text); letter-spacing: -0.01em; }

    .card-title { font-family: var(--font-display); font-size: 28px; color: var(--text); letter-spacing: -0.02em; margin-bottom: 8px; }
    .card-sub { font-size: 14px; color: var(--muted); margin-bottom: 36px; line-height: 1.5; }

    .field { margin-bottom: 20px; }
    .input-wrap { position: relative; }

    .toggle-pw {
      position: absolute; top: 50%; right: 10px;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      padding: 6px; border-radius: 6px;
      color: var(--muted2); transition: color 0.2s, background 0.2s;
    }
    .toggle-pw:hover { color: var(--accent-dark); background: var(--accent-dim); }
    .toggle-pw svg { width: 18px; height: 18px; }
    .input-wrap input { padding-right: 44px; }

    label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--muted); margin-bottom: 8px;
      letter-spacing: 0.04em; text-transform: uppercase;
    }

    input {
      width: 100%; padding: 13px 15px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text); font-family: var(--font-body); font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder { color: var(--muted2); }
    input::-ms-reveal, input::-ms-clear { display: none; }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); background: #fff; }

    .pw-strength {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
      margin-top: 8px;
    }
    .pw-bar { height: 4px; background: var(--border); border-radius: 2px; transition: background 0.2s; }
    .pw-label { font-size: 12px; color: var(--muted); margin-top: 6px; min-height: 16px; }

    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      font-family: var(--font-body); font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; margin-top: 14px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff; box-shadow: 0 4px 14px var(--accent-glow);
    }

    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--accent-glow); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .msg {
      margin-top: 14px; font-size: 13px; text-align: center;
      border-radius: 8px; min-height: 18px; padding: 0;
      transition: all 0.2s;
    }

    .msg:not(:empty) { padding: 10px 14px; }
    .msg.error   { color: var(--red-text);   background: var(--red-bg);   border: 1px solid var(--red-border); }
    .msg.success { color: var(--green-text); background: var(--green-bg); border: 1px solid var(--green-border); }

    .invalid-state { text-align: center; animation: fadeUp 0.4s ease both; }
    .invalid-state .warn-circle {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--red-bg); border: 2px solid var(--red-border);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; color: var(--red-text);
    }
    .invalid-state .warn-circle svg { width: 30px; height: 30px; }
    .invalid-state h2 { font-family: var(--font-display); font-size: 24px; color: var(--text); margin-bottom: 10px; }
    .invalid-state p { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }

    .back-home-wrap {
      margin-top: 32px; padding-top: 24px;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .back-home {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted); text-decoration: none;
      font-weight: 500;
      padding: 6px 12px; border-radius: 8px;
      transition: all 0.2s;
    }
    .back-home:hover { color: var(--accent-dark); background: var(--accent-dim); }
    .back-home svg { width: 14px; height: 14px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="layout">
  <div class="card">
    <div class="logo">
      <div class="logo-dot"></div>
      <div class="logo-name">RAG Learning</div>
    </div>

    <div id="resetStep" style="display:none;">
      <div class="card-title">Set a new password</div>
      <p class="card-sub">Choose a new password for your account. You'll be signed in automatically after saving.</p>

      <form id="form">
        <div class="field">
          <label for="password">New password</label>
          <div class="input-wrap">
            <input id="password" type="password" placeholder="At least 8 characters" required minlength="8" oninput="checkPw(this.value)" autocomplete="new-password">
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password" aria-pressed="false">
              <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="pw-strength">
            <div class="pw-bar" id="b1"></div>
            <div class="pw-bar" id="b2"></div>
            <div class="pw-bar" id="b3"></div>
            <div class="pw-bar" id="b4"></div>
          </div>
          <div class="pw-label" id="pwLabel"></div>
        </div>

        <div class="field">
          <label for="confirm">Confirm new password</label>
          <input id="confirm" type="password" placeholder="Re-enter password" required minlength="8" autocomplete="new-password">
        </div>

        <button class="btn btn-primary" id="saveBtn">Update password</button>
      </form>

      <p id="msg" class="msg"></p>
    </div>

    <div id="invalidStep" class="invalid-state" style="display:none;">
      <div class="warn-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        </svg>
      </div>
      <h2>Reset link is invalid or expired</h2>
      <p id="invalidMsg">This password reset link is no longer valid. Request a new one to continue.</p>
      <a href="forgot-password.html" class="btn btn-primary" style="display:block;text-decoration:none;text-align:center;">Request new link</a>
    </div>

    <div id="loadingStep" style="text-align:center;padding:20px 0;color:var(--muted);font-size:14px;">
      Verifying reset link…
    </div>

    <div class="back-home-wrap">
      <a href="login.html" class="back-home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
        Back to sign in
      </a>
    </div>
  </div>
</div>

<script>
const form     = document.getElementById('form');
const msg      = document.getElementById('msg');
const saveBtn  = document.getElementById('saveBtn');
const togglePw = document.getElementById('togglePw');
const pwInput  = document.getElementById('password');
const eyeIcon  = document.getElementById('eyeIcon');

const EYE_OPEN   = '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>';
const EYE_CLOSED = '<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/>';

togglePw.addEventListener('click', () => {
  const showing = pwInput.type === 'text';
  pwInput.type = showing ? 'password' : 'text';
  togglePw.setAttribute('aria-pressed', String(!showing));
  togglePw.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
  eyeIcon.innerHTML = showing ? EYE_OPEN : EYE_CLOSED;
});

function checkPw(val) {
  const bars   = [document.getElementById('b1'), document.getElementById('b2'), document.getElementById('b3'), document.getElementById('b4')];
  const colors = ['#DC2626','#D97706','#5BADCF','#16A34A'];
  const labels = ['Too weak','Weak','Good','Strong'];
  let score = 0;
  if (val.length >= 8)              score++;
  if (/[A-Z]/.test(val))            score++;
  if (/[0-9]/.test(val))            score++;
  if (/[^A-Za-z0-9]/.test(val))     score++;
  bars.forEach((b, i) => { b.style.background = i < score ? colors[score-1] : 'var(--border)'; });
  document.getElementById('pwLabel').textContent = val ? labels[Math.max(score-1, 0)] : '';
}

// ── Detect recovery session ──────────────────────────────────────────────
let hasRecoverySession = false;

function showInvalid(text) {
  document.getElementById('loadingStep').style.display = 'none';
  document.getElementById('resetStep').style.display   = 'none';
  document.getElementById('invalidStep').style.display = 'block';
  if (text) document.getElementById('invalidMsg').textContent = text;
}

function showReset() {
  document.getElementById('loadingStep').style.display = 'none';
  document.getElementById('invalidStep').style.display = 'none';
  document.getElementById('resetStep').style.display   = 'block';
}

// Surface any error params Supabase appended to the URL (e.g. expired link).
// Map known error codes to friendly messages rather than showing raw Supabase
// text — keeps wording consistent and avoids leaking implementation details.
const hashParams   = new URLSearchParams(window.location.hash.replace(/^#/, ''));
const queryParams  = new URLSearchParams(window.location.search);
const errorCode    = hashParams.get('error_code')        || queryParams.get('error_code')        || '';
const errorDesc    = hashParams.get('error_description') || queryParams.get('error_description') || '';
if (errorCode || errorDesc) {
  const descLower = decodeURIComponent(errorDesc.replace(/\+/g, ' ')).toLowerCase();
  let friendly = 'This password reset link is no longer valid. Please request a new one.';
  if (errorCode === 'otp_expired' || /expired/.test(descLower)) {
    friendly = 'This password reset link has expired. Please request a new one.';
  } else if (errorCode === 'access_denied' || /invalid|used/.test(descLower)) {
    friendly = 'This link is invalid or has already been used. Please request a new one.';
  }
  showInvalid(friendly);
}

// Listen for the PASSWORD_RECOVERY event fired by supabase-js when it parses the hash
supabaseClient.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY' && session) {
    hasRecoverySession = true;
    showReset();
  }
});

// Fallback: if no event fires (e.g. page refresh after hash cleared), check for an existing session
(async () => {
  // Give supabase-js a tick to process the URL hash
  await new Promise(r => setTimeout(r, 300));
  if (hasRecoverySession) return;
  if (errorCode || errorDesc) return;

  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session) {
    hasRecoverySession = true;
    showReset();
  } else {
    showInvalid();
  }
})();

// ── Submit new password ──────────────────────────────────────────────────
form.onsubmit = async (e) => {
  e.preventDefault();
  msg.className = 'msg';
  msg.innerText = '';

  const pw      = pwInput.value;
  const confirm = document.getElementById('confirm').value;

  if (pw.length < 8) {
    msg.className = 'msg error';
    msg.innerText = 'Password must be at least 8 characters.';
    return;
  }
  if (pw !== confirm) {
    msg.className = 'msg error';
    msg.innerText = 'Passwords do not match.';
    return;
  }

  saveBtn.disabled    = true;
  saveBtn.textContent = 'Saving…';

  const { error } = await supabaseClient.auth.updateUser({ password: pw });

  if (error) {
    msg.className       = 'msg error';
    msg.innerText       = error.message;
    saveBtn.disabled    = false;
    saveBtn.textContent = 'Update password';
    return;
  }

  msg.className = 'msg success';
  msg.innerText = 'Password updated. Redirecting…';
  setTimeout(() => { window.location = 'login.html'; }, 1200);
};
</script>
</body>
</html>
