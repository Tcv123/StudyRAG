  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #EEF5FC;
      --surface: #FFFFFF;
      --surface2: #F4F9FE;
      --border: #D2E5F3;
      --border-hover: #93C4E2;
      --text: #1B2D4F;
      --muted: #6B87A8;
      --muted2: #A0B8CE;
      --accent: #5BADCF;
      --accent-dark: #3D95BC;
      --accent-dim: rgba(91,173,207,0.1);
      --accent-glow: rgba(91,173,207,0.2);
      --font-display: 'DM Serif Display', serif;
      --font-body: 'DM Sans', sans-serif;
      --sidebar-w: 240px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 15px; -webkit-font-smoothing: antialiased; }

    .app { display: flex; min-height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w); background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 24px 0; position: fixed;
      top: 0; left: 0; bottom: 0; z-index: 10;
      box-shadow: 2px 0 16px rgba(91,173,207,0.08);
    }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 0 20px 24px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
    .logo-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
    .logo-text { font-family: var(--font-display); font-size: 18px; }
    .nav-section { padding: 0 12px; margin-bottom: 8px; }
    .nav-label { font-size: 10px; font-weight: 600; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.1em; padding: 0 8px; margin-bottom: 4px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 8px; font-size: 14px; color: var(--muted);
      cursor: pointer; transition: all 0.15s; text-decoration: none;
      border: none; background: none; width: 100%; text-align: left; font-family: var(--font-body);
    }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--accent-dim); color: var(--accent-dark); font-weight: 500; }
    .nav-icon { width: 18px; text-align: center; font-size: 15px; flex-shrink: 0; }
    .sidebar-bottom { margin-top: auto; padding: 16px 12px 0; border-top: 1px solid var(--border); }
    .user-chip { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent-dim); border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--accent-dark); flex-shrink: 0; }
    .user-info { flex: 1; min-width: 0; }
    .user-name  { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-email { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .logout-btn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; border-radius: 6px; font-size: 14px; transition: color 0.15s; }
    .logout-btn:hover { color: #DC2626; }

    /* ── MAIN ── */
    .main { margin-left: var(--sidebar-w); flex: 1; padding: 40px 44px; }

    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
    .page-title { font-family: var(--font-display); font-size: 28px; letter-spacing: -0.02em; }
    .page-sub { font-size: 14px; color: var(--muted); margin-top: 3px; }

    /* ── SUBJECT GRID ── */
    .subjects-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .subject-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 24px;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
      text-decoration: none; color: inherit;
      display: flex; flex-direction: column; gap: 16px;
      position: relative; overflow: hidden;
    }
    .subject-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-dark));
      opacity: 0; transition: opacity 0.15s;
    }
    .subject-card.available:hover {
      border-color: var(--border-hover);
      box-shadow: 0 6px 24px rgba(91,173,207,0.14);
      transform: translateY(-2px);
    }
    .subject-card.available:hover::before { opacity: 1; }

    .subject-card.locked {
      opacity: 0.6; cursor: default;
    }

    .card-top { display: flex; align-items: center; gap: 14px; }

    .card-emoji {
      width: 52px; height: 52px; border-radius: 14px; flex-shrink: 0;
      background: var(--accent-dim); border: 1px solid rgba(91,173,207,0.2);
      display: flex; align-items: center; justify-content: center; font-size: 24px;
    }

    .card-info { flex: 1; min-width: 0; }
    .card-name { font-size: 17px; font-weight: 600; font-family: var(--font-display); letter-spacing: -0.01em; }
    .card-board { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .card-status {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
    }
    .status-available { background: rgba(22,163,74,0.08); border: 1px solid rgba(22,163,74,0.2); color: #15803D; }
    .status-soon      { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }

    .card-topics { display: flex; flex-direction: column; gap: 5px; }
    .card-topic-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--muted); padding: 4px 0;
      border-bottom: 1px solid var(--bg);
    }
    .card-topic-row:last-child { border-bottom: none; }
    .card-topic-num {
      font-size: 10px; font-weight: 700; color: var(--accent-dark);
      background: var(--accent-dim); padding: 1px 6px; border-radius: 4px; flex-shrink: 0;
    }

    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 12px; border-top: 1px solid var(--border);
    }
    .card-count { font-size: 12px; color: var(--muted); }
    .card-arrow { font-size: 16px; color: var(--accent); }
    .subject-card.locked .card-arrow { color: var(--muted2); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .subjects-grid > * {
      animation: fadeUp 0.4s ease both;
    }
    .subjects-grid > *:nth-child(2) { animation-delay: 0.05s; }
    .subjects-grid > *:nth-child(3) { animation-delay: 0.1s; }
    .subjects-grid > *:nth-child(4) { animation-delay: 0.15s; }
    .subjects-grid > *:nth-child(5) { animation-delay: 0.2s; }
    .subjects-grid > *:nth-child(6) { animation-delay: 0.25s; }
    .subjects-grid > *:nth-child(7) { animation-delay: 0.3s; }

async function load() {
  const { data: { user } } = await supabaseClient.auth.getUser();
  if (!user) { window.location = 'auth/login.html'; return; }

  const { data: profile  } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
  const { data: subjects } = await supabaseClient.from('user_subjects').select('*').eq('user_id', user.id).order('created_at');

  const firstName = profile?.first_name || '';
  const lastName  = profile?.last_name  || '';
  document.getElementById('sidebarName').textContent    = `${firstName} ${lastName}`.trim();
  document.getElementById('sidebarEmail').textContent   = user.email;
  document.getElementById('avatarInitials').textContent = ((firstName[0]||'')+(lastName[0]||'')).toUpperCase() || '?';

  const list = subjects || [];
  document.getElementById('pageSubTitle').textContent =
    `${list.length} subject${list.length !== 1 ? 's' : ''} — click one to open its notes`;

  const grid = document.getElementById('subjectsGrid');

  if (!list.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted);">
      <div style="font-size:40px;margin-bottom:12px;">📄</div>
      <div style="font-family:var(--font-display);font-size:20px;margin-bottom:8px;">No subjects yet</div>
      <div style="font-size:14px;">Go to <a href="auth/setup.html" style="color:var(--accent-dark);">setup</a> to add your subjects.</div>
    </div>`;
    return;
  }

  grid.innerHTML = list.map(s => {
    const notes    = NOTES_AVAILABLE[`${s.subject}|${s.exam_board}`];
    const available = !!notes;
    const topics   = notes?.topics || [];
    const preview  = topics.slice(0, 3);

    return available
      ? `<a href="${notes.url}" class="subject-card available">
          <div class="card-top">
            <div class="card-emoji">${s.emoji || '📚'}</div>
            <div class="card-info">
              <div class="card-name">${s.subject}</div>
              <div class="card-board">${s.exam_board}</div>
            </div>
          </div>
          <div class="card-topics">
            ${preview.map(t => `
              <div class="card-topic-row">
                <span class="card-topic-num">${t.num}</span>
                <span>${t.name}</span>
              </div>`).join('')}
            ${topics.length > 3 ? `<div class="card-topic-row" style="color:var(--accent-dark);font-weight:500;">+ ${topics.length - 3} more topics</div>` : ''}
          </div>
          <div class="card-footer">
            <span class="card-status status-available">✓ Notes available</span>
            <span class="card-arrow">→</span>
          </div>
        </a>`
      : `<div class="subject-card locked">
          <div class="card-top">
            <div class="card-emoji">${s.emoji || '📚'}</div>
            <div class="card-info">
              <div class="card-name">${s.subject}</div>
              <div class="card-board">${s.exam_board}</div>
            </div>
          </div>
          <div class="card-footer">
            <span class="card-status status-soon">🔒 Coming soon</span>
            <span class="card-arrow">—</span>
          </div>
        </div>`;
  }).join('');
}

async function logout() {
  await supabaseClient.auth.signOut();
  window.location = 'auth/login.html';
}

load();
</script>
